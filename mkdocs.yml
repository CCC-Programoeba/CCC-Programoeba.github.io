site_name: CCC-Programoeba
site_url: https://ccc-programoeba.github.io/

theme:
  name: material
  features:
    - navigation.top
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: A modo oscuro

    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: A modo claro

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - attr_list

nav:
  - Inicio: index.md