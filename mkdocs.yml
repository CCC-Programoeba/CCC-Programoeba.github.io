site_name: CCC-Programoeba
site_url: https://ccc-programoeba.github.io/

theme:
  name: material
  features:
    - navigation.top
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro

    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro

extra_css:
  - stylesheets/extra.css

nav:
  - Inicio: index.md